name: Build, Test and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: msbuild TestApp.Tests/TestApp.Tests.csproj -t:Restore -p:Configuration=Release

      - name: Build solution
        run: msbuild TestApp.Tests/TestApp.Tests.csproj -p:Configuration=Release -p:Platform=AnyCPU

      - name: Run tests
        run: |
          & "C:\Program Files\Microsoft Visual Studio\18\Community\Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe" `
            TestApp.Tests/bin/Release/TestApp.Tests.dll `
            /logger:trx `
            /ResultsDirectory:TestResults

      - name: Deploy to local folder
        run: |
          $dest = "D:\Learning\Development\GitHub\Reppo\Deploy"
          if (!(Test-Path $dest)) { New-Item -ItemType Directory -Path $dest }
          Copy-Item -Path "TestApp/bin/Release/*" -Destination $dest -Recurse -Force
          Write-Host "Deployed to $dest"
